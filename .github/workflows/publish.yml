name: Publish to pub.dev

# Triggered by tags pushed from release-tag.yml. Uses pub.dev automated
# publishing (OIDC) — no tokens stored. REQUIRED ONE-TIME SETUP on pub.dev
# (package Admin -> Automated publishing -> Publishing from GitHub Actions):
#   flutter_instantdb           -> repository: tsiresymila1/flutter_instantdb
#                                  tag pattern: v{{version}}
#   flutter_instantdb_generator -> same repository, tag pattern: generator-v{{version}}
# Leave "Require GitHub Actions environment" UNCHECKED (these jobs set no
# environment). If you check it, add a matching `environment:` to the job below.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'generator-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # Main package: use Dart's official reusable publish workflow. It performs the
  # GitHub -> pub.dev OIDC token exchange and fails fast on misconfig (no
  # interactive auth prompt / 15-minute hang).
  publish-main:
    if: ${{ startsWith(github.ref_name, 'v') }}
    permissions:
      id-token: write # required for pub.dev OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1

  # Generator subpackage: kept custom because the root .pubignore must be
  # stripped before the archive is built, which the reusable workflow can't do.
  # `timeout 180` makes an OIDC misconfig fail in 3 min instead of hanging 15.
  publish-generator:
    if: ${{ startsWith(github.ref_name, 'generator-v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # required for pub.dev OIDC
    defaults:
      run:
        working-directory: flutter_instantdb_generator
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      # The root .pubignore excludes this subpackage from the MAIN package's
      # archive; that ancestor rule also hides the generator's own files when
      # publishing it. Strip the line for this job only (checkout is ephemeral).
      - name: Unhide generator from its own archive
        working-directory: .
        run: sed -i '/^flutter_instantdb_generator$/d' .pubignore
      - run: dart pub get
      - run: dart test
      - name: Publish
        run: timeout 180 dart pub publish --force
