name: Release (tag on version bump)

# On every push to main, if a package's `version:` changed, push a git tag.
# The tag then triggers `publish.yml` (pub.dev OIDC publishing).
#   - flutter_instantdb            -> tag  v<version>
#   - flutter_instantdb_generator  -> tag  generator-v<version>

on:
  push:
    branches: [main]
    paths:
      - 'pubspec.yaml'
      - 'flutter_instantdb_generator/pubspec.yaml'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag flutter_instantdb if version bumped
        run: |
          v=$(grep -E '^version:' pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//')
          tag="v$v"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — skipping."
          else
            git tag "$tag"
            git push origin "$tag"
            echo "Pushed $tag"
          fi

      - name: Tag flutter_instantdb_generator if version bumped
        run: |
          v=$(grep -E '^version:' flutter_instantdb_generator/pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//')
          tag="generator-v$v"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — skipping."
          else
            git tag "$tag"
            git push origin "$tag"
            echo "Pushed $tag"
          fi
