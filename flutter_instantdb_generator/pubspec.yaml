name: flutter_instantdb_generator
description: >-
  Build-time code generator for flutter_instantdb. Emits type-safe query tables,
  typed transactions, and relation accessors from @InstantModel-annotated models.
version: 0.1.0
homepage: https://github.com/tsiresymila1/flutter_instantdb
repository: https://github.com/tsiresymila1/flutter_instantdb
issue_tracker: https://github.com/tsiresymila1/flutter_instantdb/issues
documentation: https://flutter-instantdb.vercel.app/typed/codegen
topics:
  - instantdb
  - codegen
  - build-runner
  - source-gen
  - database

environment:
  sdk: ^3.8.0

dependencies:
  analyzer: '>=6.0.0 <8.0.0'
  build: ^2.4.0
  source_gen: ^1.5.0

dev_dependencies:
  build_runner: ^2.4.13
  source_gen_test: ^1.0.6
  test: ^1.24.0
  lints: ^4.0.0
