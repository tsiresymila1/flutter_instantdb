<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flutter InstantDB">
  <defs>
    <linearGradient id="fid-bg" x1="24" y1="16" x2="180" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5AA6FF"/>
      <stop offset="0.55" stop-color="#2F7BFF"/>
      <stop offset="1" stop-color="#1E5FE0"/>
    </linearGradient>
    <linearGradient id="fid-bolt" x1="100" y1="26" x2="100" y2="174" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>
    <radialGradient id="fid-shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(58 46) rotate(46) scale(160)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- squircle backplate -->
  <rect x="12" y="12" width="176" height="176" rx="46" fill="url(#fid-bg)"/>
  <rect x="12" y="12" width="176" height="176" rx="46" fill="url(#fid-shine)"/>
  <rect x="12.5" y="12.5" width="175" height="175" rx="45.5" stroke="#FFFFFF" stroke-opacity="0.18"/>

  <!-- "instant" lightning bolt -->
  <path d="M118 28 L68 108 L96 108 L84 172 L138 86 L110 86 Z"
        fill="url(#fid-bolt)" stroke="#1E5FE0" stroke-opacity="0.14" stroke-width="2" stroke-linejoin="round"/>

  <!-- amber spark accent -->
  <circle cx="146" cy="54" r="9" fill="#FFB057" fill-opacity="0.28"/>
  <circle cx="146" cy="54" r="5" fill="#FFB057"/>
</svg>
